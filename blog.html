<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexpath Tax Blog | Guides by Livia</title>
  <meta name="description" content="Guides by Livia, presented in a clean modal reading experience." />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="site-header"></div>

  <section class="bg-blue-600 text-white">
    <div class="max-w-6xl mx-auto px-4 py-14 text-center">
      <h1 class="text-3xl md:text-4xl font-bold mb-3">Blog Guides</h1>
    </div>
  </section>

  <main class="max-w-6xl mx-auto px-4 py-12 space-y-10">
    <section class="bg-white rounded-2xl border border-blue-100 shadow-sm p-5 md:p-8 grid md:grid-cols-[220px_1fr] gap-6 items-center">
      <img src="assets/images/livia_pic.jpg" alt="Livia Lin" class="w-full h-60 md:h-64 object-cover object-top rounded-xl" />
      <div>
        <p class="text-sm uppercase tracking-wider text-blue-600 mb-2">Featured Author</p>
        <h2 class="text-2xl font-semibold mb-2">Livia Lin, CA CTA</h2>
        <p class="text-gray-600 leading-relaxed">A practical Australian tax specialist focused on making complex tax topics clear and actionable for individuals, contractors, and small businesses.</p>
      </div>
    </section>

    <div id="posts" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <section class="pb-16">
    <div class="max-w-4xl mx-auto px-4">
      <div class="bg-white border border-blue-100 rounded-2xl p-8 text-center shadow-sm">
        <h2 class="text-2xl font-semibold mb-3 text-blue-800">Need help with your tax situation?</h2>
        <p class="text-slate-600 mb-5">Talk to Flexpath Tax for clear, practical next steps.</p>
        <a href="contact.html" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">Contact Us</a>
      </div>
    </div>
  </section>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white max-w-3xl w-full max-h-[85vh] rounded-lg shadow-xl overflow-hidden">
      <div class="flex justify-between items-center px-5 py-4 border-b">
        <h2 id="modalTitle" class="text-2xl md:text-3xl font-extrabold leading-tight text-blue-700"></h2>
        <button id="modalClose" class="text-gray-500 hover:text-gray-800 text-xl">×</button>
      </div>
      <div id="modalMeta" class="px-5 pt-2 text-sm text-blue-700 font-medium"></div>
      <article id="modalBody" class="px-5 pb-4 pt-2 overflow-y-auto max-h-[65vh] text-[14px] leading-5"></article>
    </div>
  </div>

  <div id="site-footer"></div>

  <script>
    async function loadPartial(id, file) {
      const response = await fetch(file);
      document.getElementById(id).innerHTML = await response.text();
    }

    function setLanguageLinks() {
      const path = window.location.pathname;
      const file = path.split('/').pop() || 'index.html';
      const isZh = path.includes('/zh/');
      const target = isZh ? `../${file}` : `zh/${file}`;
      document.querySelectorAll('.lang-switch').forEach(a => {
        a.setAttribute('href', target);
        a.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = target;
        });
      });
    }

    async function initLayout() {
      await loadPartial("site-header", "partials/header.html");
      await loadPartial("site-footer", "partials/footer.html");
      setLanguageLinks();
    }

    initLayout();



    function compactArticleText(text) {
      return String(text || '')
        .replace(/\r\n/g, '\n')
        .replace(/\n[\t ]*\n[\t ]*\n+/g, '\n\n')
        .trim();
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderArticleHTML(rawText) {
      const text = compactArticleText(rawText);
      const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
      const html = [];

      blocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
        if (!lines.length) return;

        if (lines.every(l => /^[-•]\s+/.test(l))) {
          html.push(`<ul class="list-disc pl-5 my-2 space-y-0.5 marker:text-blue-500 marker:text-base">${lines.map(l => `<li class="pl-1">${escapeHtml(l.replace(/^[-•]\s+/, ''))}</li>`).join('')}</ul>`);
          return;
        }

        if (lines.length === 1) {
          const line = lines[0];
          if (/^[A-Z][A-Za-z0-9\s&()\-—:?,]{3,}$/.test(line) || /[：:]$/.test(line) || /\?$/.test(line)) {
            html.push(`<h3 class="text-[30px] font-extrabold text-blue-700 mt-5 mb-2 border-l-4 border-blue-500 pl-3">${escapeHtml(line)}</h3>`);
            return;
          }
        }

        const parts = [];
        lines.forEach((line, idx) => {
          if (/^[-•]\s+/.test(line)) {
            parts.push(`<ul class="list-disc pl-5 my-1 marker:text-blue-500 marker:text-base"><li class="pl-1">${escapeHtml(line.replace(/^[-•]\s+/, ''))}</li></ul>`);
          } else if (idx === 0 && lines.length > 1 && line.length <= 70 && /[：:]$/.test(line)) {
            parts.push(`<h4 class="text-xl font-extrabold text-blue-600 mt-4 mb-1 border-l-3 border-blue-300 pl-3">${escapeHtml(line)}</h4>`);
          } else {
            parts.push(`<p class="my-1 leading-5">${escapeHtml(line)}</p>`);
          }
        });
        html.push(parts.join(''));
      });

      return `<div class="max-w-[700px] mx-auto">${html.join('')}</div>`;
    }

    const postsEl = document.getElementById('posts');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMeta = document.getElementById('modalMeta');
    const modalBody = document.getElementById('modalBody');
    document.getElementById('modalClose').onclick = () => modal.classList.add('hidden');
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

    fetch('assets/livia_blog_data.json')
      .then(r => r.json())
      .then(posts => {
        postsEl.innerHTML = posts.map((p, i) => `
          <article class="bg-white border border-blue-100 rounded-2xl shadow-sm p-6 hover:shadow-md hover:-translate-y-0.5 transition">
            <p class="text-sm text-blue-600 font-medium mb-2">Guides · ${p.date || ''}</p>
            <h2 class="text-xl font-semibold mb-3">${p.title}</h2>
            <p class="text-gray-700 mb-4 line-clamp-4">${p.excerpt || ''}</p>
            <button data-i="${i}" class="read-btn text-blue-600 font-medium hover:underline">Read article</button>
          </article>
        `).join('');

        document.querySelectorAll('.read-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const p = posts[Number(btn.dataset.i)];
            modalTitle.textContent = p.title;
            modalMeta.textContent = `${p.author} · ${p.date} · ${p.readTime || ''} mins`;
            modalBody.innerHTML = renderArticleHTML(p.content_text || '');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
          });
        });
      });
  </script>
</body>
</html>
